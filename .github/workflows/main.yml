name: Build Multi-Platform Binaries

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GO_VERSION: '1.21'
  APP_NAME: crypto-app

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64, 386]
        exclude:
          - os: darwin
            arch: 386
          - os: windows
            arch: arm64
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Configure Go environment
      run: |
        go mod init crypto-app || true
        go mod tidy
    
    - name: Build binary
      run: |
        go build -ldflags="-s -w" -o ${{ env.APP_NAME }}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }}
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
        CGO_ENABLED: 0
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
        path: ${{ env.APP_NAME }}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }}
        if-no-files-found: error

  build-all-in-one:
    name: Create Release Package
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
    
    - name: Create zip archive
      run: |
        mkdir release
        cp -r artifacts/* release/
        zip -r ${{ env.APP_NAME }}-all-platforms.zip release/
    
    - name: Upload consolidated archive
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-all-platforms
        path: ${{ env.APP_NAME }}-all-platforms.zip

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-all-in-one
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
    
    - name: Prepare release files
      run: |
        mkdir -p release-files
        find artifacts -type f -name "${{ env.APP_NAME }}-*" -exec cp {} release-files/ \;
        cd release-files
        for file in *; do
          if [[ $file == *".exe" ]]; then
            mv "$file" "${file%.exe}"
          fi
        done
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release-files/*
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
